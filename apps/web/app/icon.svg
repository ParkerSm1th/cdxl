<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Background with more pronounced rounding -->
  <rect width="100" height="100" rx="22" fill="#1a1a1a"/>
  <!-- ">" chevron as a path -->
  <polyline
    points="18,28 46,50 18,72"
    fill="none"
    stroke="#d4d4d4"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- "_" cursor bar -->
  <line
    x1="54" y1="72"
    x2="82" y2="72"
    stroke="#d4d4d4"
    stroke-width="10"
    stroke-linecap="round"
  />
</svg>
